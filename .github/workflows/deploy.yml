name: Build & Deploy to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24.x'
          cache: 'npm'

      - name: Detect GitHub Pages base URL
        id: pages_base
        run: |
          PAGES_JSON="$(curl -fsSL https://api.github.com/repos/${GITHUB_REPOSITORY}/pages || true)"
          BASE_URL="$(printf '%s' "${PAGES_JSON}" | node -e 'const fs = require("fs"); const input = fs.readFileSync(0, "utf8").trim(); const data = input ? JSON.parse(input) : {}; process.stdout.write(data.cname ? "" : "/eiken-coach");')"
          echo "base_url=${BASE_URL}" >> "$GITHUB_OUTPUT"

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build web
        run: npm run build:web
        env:
          EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}
          EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY }}
          EXPO_PUBLIC_CLAUDE_API_KEY: ${{ secrets.EXPO_PUBLIC_CLAUDE_API_KEY }}
          EXPO_PUBLIC_WHISPER_API_KEY: ${{ secrets.EXPO_PUBLIC_WHISPER_API_KEY }}
          EXPO_PUBLIC_SENTRY_DSN: ${{ secrets.EXPO_PUBLIC_SENTRY_DSN }}
          EXPO_PUBLIC_GA_MEASUREMENT_ID: ${{ secrets.EXPO_PUBLIC_GA_MEASUREMENT_ID }}
          NODE_ENV: production
          EXPO_PUBLIC_ENV: production
          GITHUB_PAGES_BASE_URL: ${{ steps.pages_base.outputs.base_url }}

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'dist'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
