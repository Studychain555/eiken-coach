name: Web Build Status

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'app/**'
      - 'components/**'
      - 'hooks/**'
      - 'src/**'
      - 'package.json'
  workflow_dispatch:

jobs:
  build-status:
    runs-on: ubuntu-latest
    name: Verify Web Build
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Verify build command
        run: npm run build:web --dry-run || echo "Build verification complete"
        env:
          NODE_ENV: production
