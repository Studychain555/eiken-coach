name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  deployments: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Check Cloudflare secrets
        id: cloudflare_secrets
        run: |
          if [ -z "${{ secrets.CLOUDFLARE_API_TOKEN }}" ] || [ -z "${{ secrets.CLOUDFLARE_ACCOUNT_ID }}" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Cloudflare secrets are missing. Skipping deployment."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Node.js
        if: steps.cloudflare_secrets.outputs.skip != 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '24.x'
          cache: 'npm'

      - name: Install dependencies
        if: steps.cloudflare_secrets.outputs.skip != 'true'
        run: npm ci --legacy-peer-deps

      - name: Build web for root deploy
        if: steps.cloudflare_secrets.outputs.skip != 'true'
        run: npm run build:web:root
        env:
          EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}
          EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY }}
          EXPO_PUBLIC_CLAUDE_API_KEY: ${{ secrets.EXPO_PUBLIC_CLAUDE_API_KEY }}
          EXPO_PUBLIC_WHISPER_API_KEY: ${{ secrets.EXPO_PUBLIC_WHISPER_API_KEY }}
          EXPO_PUBLIC_ENV: production
          NODE_ENV: production

      - name: Deploy to Cloudflare Pages
        if: steps.cloudflare_secrets.outputs.skip != 'true'
        id: deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
          command: pages deploy dist --project-name=eiken-coach --branch=main
