name: Build and Deploy to Production

on:
  push:
    tags:
      - 'v*.*.*'  # Semantic versioning tag
  workflow_dispatch:
    inputs:
      platform:
        description: 'Platform to build'
        required: true
        default: 'all'
        type: choice
        options:
          - 'ios'
          - 'android'
          - 'web'
          - 'all'

env:
  NODE_VERSION: '18.17.0'
  EXPO_CACHE: true

jobs:
  # ========== Pre-build checks ==========
  pre_checks:
    runs-on: ubuntu-latest
    name: Pre-build Checks
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run linter
        run: npm run lint

      - name: TypeScript type check
        run: npx tsc --noEmit

      - name: Check bundle size
        run: |
          echo "Bundle size check..."
          # TODO: Add bundle size check script

      - name: Validate environment variables
        run: |
          required_vars=(
            "EXPO_PUBLIC_SUPABASE_URL"
            "EXPO_PUBLIC_SUPABASE_ANON_KEY"
            "EXPO_PUBLIC_CLAUDE_API_KEY"
          )
          for var in "${required_vars[@]}"; do
            if [ -z "${!var}" ]; then
              echo "Error: $var is not set"
              exit 1
            fi
          done
        env:
          EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}
          EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY }}
          EXPO_PUBLIC_CLAUDE_API_KEY: ${{ secrets.EXPO_PUBLIC_CLAUDE_API_KEY }}

  # ========== iOS Build ==========
  build_ios:
    runs-on: ubuntu-latest
    needs: pre_checks
    if: |
      github.event_name == 'push' ||
      github.event.inputs.platform == 'ios' ||
      github.event.inputs.platform == 'all'
    name: Build iOS
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Setup EAS CLI
        run: npm install -g eas-cli

      - name: Build iOS with EAS
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}
          EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY }}
          EXPO_PUBLIC_CLAUDE_API_KEY: ${{ secrets.EXPO_PUBLIC_CLAUDE_API_KEY }}
          EXPO_PUBLIC_SENTRY_DSN: ${{ secrets.EXPO_PUBLIC_SENTRY_DSN }}
          EXPO_PUBLIC_GA_MEASUREMENT_ID: ${{ secrets.EXPO_PUBLIC_GA_MEASUREMENT_ID }}
        run: |
          eas build --platform ios --release-channel production --non-interactive

      - name: Submit to TestFlight
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          ASC_APP_ID: ${{ secrets.ASC_APP_ID }}
        run: |
          eas submit --platform ios --latest --non-interactive

      - name: Notify on success
        run: |
          echo "✅ iOS build completed successfully"
          echo "Build ID: $(eas build:list --platform ios --limit 1 --json | jq -r '.[0].id')"

  # ========== Android Build ==========
  build_android:
    runs-on: ubuntu-latest
    needs: pre_checks
    if: |
      github.event_name == 'push' ||
      github.event.inputs.platform == 'android' ||
      github.event.inputs.platform == 'all'
    name: Build Android
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Setup EAS CLI
        run: npm install -g eas-cli

      - name: Decode keystore
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > eigomaster-key.jks

      - name: Build Android with EAS
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}
          EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY }}
          EXPO_PUBLIC_CLAUDE_API_KEY: ${{ secrets.EXPO_PUBLIC_CLAUDE_API_KEY }}
          EXPO_PUBLIC_SENTRY_DSN: ${{ secrets.EXPO_PUBLIC_SENTRY_DSN }}
          EXPO_PUBLIC_GA_MEASUREMENT_ID: ${{ secrets.EXPO_PUBLIC_GA_MEASUREMENT_ID }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          eas build --platform android --release-channel production --non-interactive

      - name: Submit to Google Play
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
        run: |
          eas submit --platform android --latest --non-interactive

      - name: Notify on success
        run: |
          echo "✅ Android build completed successfully"
          echo "Build ID: $(eas build:list --platform android --limit 1 --json | jq -r '.[0].id')"

  # ========== Web Deploy ==========
  deploy_web:
    runs-on: ubuntu-latest
    needs: pre_checks
    if: |
      github.event_name == 'push' ||
      github.event.inputs.platform == 'web' ||
      github.event.inputs.platform == 'all'
    name: Deploy Web
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Vercel CLI
        run: npm install -g vercel

      - name: Build web
        env:
          EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}
          EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY }}
          EXPO_PUBLIC_CLAUDE_API_KEY: ${{ secrets.EXPO_PUBLIC_CLAUDE_API_KEY }}
          EXPO_PUBLIC_SENTRY_DSN: ${{ secrets.EXPO_PUBLIC_SENTRY_DSN }}
          EXPO_PUBLIC_GA_MEASUREMENT_ID: ${{ secrets.EXPO_PUBLIC_GA_MEASUREMENT_ID }}
          NODE_ENV: production
        run: |
          npm run web -- --export

      - name: Deploy to Vercel
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
        run: |
          vercel --prod --token $VERCEL_TOKEN

      - name: Run Lighthouse CI
        uses: treosh/lighthouse-ci-action@v10
        with:
          configPath: ./lighthouserc.json
          uploadArtifacts: true

      - name: Notify on success
        run: echo "✅ Web deployment completed successfully"

  # ========== Performance Test ==========
  performance_test:
    runs-on: ubuntu-latest
    needs: deploy_web
    if: success()
    name: Performance Test
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install Lighthouse
        run: npm install -g lighthouse

      - name: Run Lighthouse audit
        run: |
          lighthouse https://eigomaster.com \
            --output=json \
            --output=html \
            --output-path=./lighthouse-report
        continue-on-error: true

      - name: Upload Lighthouse report
        uses: actions/upload-artifact@v3
        with:
          name: lighthouse-report
          path: ./lighthouse-report.*

      - name: Check performance thresholds
        run: |
          # Extract scores from Lighthouse report
          performance_score=$(node -e "console.log(require('./lighthouse-report.json').categories.performance.score * 100)" || echo "0")

          if (( $(echo "$performance_score < 80" | bc -l) )); then
            echo "⚠️ Performance score below 80: $performance_score"
          else
            echo "✅ Performance score acceptable: $performance_score"
          fi

  # ========== Notify Slack ==========
  notify_slack:
    runs-on: ubuntu-latest
    needs: [build_ios, build_android, deploy_web]
    if: always()
    name: Notify Slack
    steps:
      - name: Build status
        run: |
          if [ "${{ needs.build_ios.result }}" = "success" ] && \
             [ "${{ needs.build_android.result }}" = "success" ] && \
             [ "${{ needs.deploy_web.result }}" = "success" ]; then
            status="✅ SUCCESS"
            color="good"
          else
            status="❌ FAILED"
            color="danger"
          fi

          echo "STATUS=$status" >> $GITHUB_ENV
          echo "COLOR=$color" >> $GITHUB_ENV

      - name: Send Slack notification
        uses: slackapi/slack-github-action@v1
        with:
          payload: |
            {
              "text": "EigoMaster Deployment ${{ env.STATUS }}",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*EigoMaster Deployment*\nVersion: ${{ github.ref_name }}\nStatus: ${{ env.STATUS }}"
                  }
                },
                {
                  "type": "section",
                  "fields": [
                    {
                      "type": "mrkdwn",
                      "text": "*iOS Build*\n${{ needs.build_ios.result }}"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "*Android Build*\n${{ needs.build_android.result }}"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "*Web Deploy*\n${{ needs.deploy_web.result }}"
                    }
                  ]
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
