<!DOCTYPE html>
<html>
<head>
    <title>Redirecting...</title>
    <script>
        // GitHub Pages SPA redirect
        const pathname = window.location.pathname;
        const redirect = pathname.replace(/^\/eiken-coach/, '') || '/';
        sessionStorage.redirect = redirect;
        window.location.replace('/eiken-coach/');
    </script>
</head>
<body></body>
</html>
